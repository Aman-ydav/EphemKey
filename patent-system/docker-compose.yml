version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: patent_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: patent_system

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: patent_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/patent_system
      SERVER_SECRET: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
      SERVER_ID: patent-node-01
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: patent_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
